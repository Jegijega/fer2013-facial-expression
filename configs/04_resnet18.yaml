# ResNet18 with ImageNet weights, transfer learning
model: resnet18
run_name: 04_resnet18_pretrained
group: transfer_learning
notes: "torchvision ResNet18, 1-ch stem, ImageNet init, augmentation + cosine LR."
tags: [resnet, transfer, deep]
model_kwargs:
  pretrained: true

batch_size: 128
augment: true
epochs: 50
lr: 0.0005
optimizer: adamw
weight_decay: 0.0005
scheduler: cosine
label_smoothing: 0.05
grad_clip: 5.0
early_stop_patience: 10
seed: 42
